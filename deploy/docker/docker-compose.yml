services:
  nginx:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
    networks:
      - cloud-platform-network

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - /root/cloud-platform/deploy/docker/.env
    environment:
      - DATABASE_URL=mysql+pymysql://${RDS_USER}:${RDS_PASSWORD}@${RDS_ENDPOINT}:3306/${RDS_DATABASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/0
      - OBS_ENDPOINT=${OBS_ENDPOINT}
      - OBS_ACCESS_KEY=${OBS_ACCESS_KEY}
      - OBS_SECRET_KEY=${OBS_SECRET_KEY}
      - OBS_BUCKET_NAME=${OBS_BUCKET_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - API_PREFIX=${API_PREFIX}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - cloud-platform-network

  spark:
    build:
      context: ../../spark-jobs
      dockerfile: Dockerfile
    environment:
      - SPARK_MASTER=local[*]
      - ELASTICSEARCH_URL=http://${ES_ENDPOINT}:9200
      - ELASTICSEARCH_USER=${ES_USER}
      - ELASTICSEARCH_PASSWORD=${ES_PASSWORD}
    networks:
      - cloud-platform-network

networks:
  cloud-platform-network:
    driver: bridge
