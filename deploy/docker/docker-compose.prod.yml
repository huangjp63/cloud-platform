version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - cloud-platform-network

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://${RDS_USER}:${RDS_PASSWORD}@${RDS_ENDPOINT}:3306/${RDS_DATABASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@${REDIS_ENDPOINT}:6379/0
      - MINIO_ENDPOINT=${OBS_ENDPOINT}
      - MINIO_ACCESS_KEY=${OBS_ACCESS_KEY}
      - MINIO_SECRET_KEY=${OBS_SECRET_KEY}
      - ELASTICSEARCH_URL=http://${ES_ENDPOINT}:9200
      - ELASTICSEARCH_USER=${ES_USER}
      - ELASTICSEARCH_PASSWORD=${ES_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
    networks:
      - cloud-platform-network

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/app/dist
    networks:
      - cloud-platform-network

  spark:
    build:
      context: ../../spark-jobs
      dockerfile: Dockerfile
    environment:
      - SPARK_MASTER=local[*]
      - ELASTICSEARCH_URL=http://${ES_ENDPOINT}:9200
      - ELASTICSEARCH_USER=${ES_USER}
      - ELASTICSEARCH_PASSWORD=${ES_PASSWORD}
    networks:
      - cloud-platform-network

networks:
  cloud-platform-network:
    driver: bridge

volumes:
  frontend_dist:
